name = "ev-desk-arena"
main = "src/index.js"
compatibility_date = "2026-07-01"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "ev-desk-arena"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
ARENA_SYMBOLS = "BTCUSDT,ETHUSDT,SOLUSDT"
ARENA_TIMEFRAMES = "15m,1h,4h"
ARENA_SOURCE = "Binance -> OKX -> Kraken official public APIs"
ALPACA_FEED = "iex"
ALLOWED_ORIGIN = "https://REPLACE_WITH_FRONTEND_ORIGIN"

# Secrets:
# wrangler secret put ADMIN_TOKEN
# wrangler secret put FRED_API_KEY
# wrangler secret put ALPACA_KEY_ID
# wrangler secret put ALPACA_SECRET_KEY
